[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirects for SPA behavior
[[redirects]]
  from = "/noitah/*"
  to = "/noitah/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Edge functions for Instagram API (if needed)
[[edge_functions]]
  function = "instagram-proxy"
  path = "/api/instagram"

# Plugin configurations
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    audits = ["performance", "accessibility", "best-practices", "seo"]
    output_path = "lighthouse-reports"
    fail_deploy_on_score_thresholds = false  # TEMP: disabled while fixing performance issues (re-enable after improvements)

    [plugins.inputs.thresholds]
      performance = 80
      accessibility = 90
      best-practices = 90
      seo = 80
